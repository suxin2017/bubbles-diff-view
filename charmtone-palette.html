<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Charmtone Static Palette</title>
  <style>
    :root {
      --bg: #f4f4f1;
      --ink: #212121;
      --card: #fffffd;
      --muted: #6b6b6b;
      --ring: #d7d7cf;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "IBM Plex Sans", "Segoe UI", sans-serif;
      color: var(--ink);
      background: var(--bg);
      min-height: 100vh;
    }
    .wrap { width: min(980px, 92vw); margin: 2rem auto; }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
      gap: 12px;
    }
    .swatch {
      border: 1px solid var(--ring);
      border-radius: 14px;
      background: var(--card);
      overflow: hidden;
      cursor: copy;
    }
    .chip { height: 80px; }
    .meta { padding: 10px; }
    .name { font-weight: 700; }
    .hex { color: var(--muted); font-family: "IBM Plex Mono", Consolas, monospace; font-size: 0.85rem; margin-top: 4px; }
    .tags { margin-top: 8px; display: flex; flex-wrap: wrap; gap: 6px; }
    .tag {
      border: 1px solid var(--ring);
      border-radius: 999px;
      padding: 0.1rem 0.45rem;
      font-size: 0.74rem;
      background: #fafaf7;
    }
  </style>
</head>

  <main class="wrap">
    <h1>Charmtone Static Palette</h1>
    <p>Generated by Go at build time from charmtone constants.</p>
    <p>VS Code terminal and JetBrains IDEA terminal are marked as supported under truecolor mode.</p>
    <div id="grid" class="grid"></div>
    <p id="copyTip"></p>
  </main>

ep balanced","safe256":false,"vscodeTerminal":"yes (truecolor)","ideaTerminal":"yes (truecolor)"},{"key":"Pom","name":"Pom","label":"Pom","hex":"#AB2454","rgb":"rgb(171, 36, 84)","group":"Diff deletions","hueFamily":"Pink","tone":"dark balanced","safe256":false,"vscodeTerminal":"yes (truecolor)","ideaTerminal":"yes (truecolor)"},{"key":"Steak","name":"Steak","label":"Steak","hex":"#582238","rgb":"rgb(88, 34, 56)","group":"Diff deletions","hueFamily":"Pink","tone":"dark balanced","safe256":false,"vscodeTerminal":"yes (truecolor)","ideaTerminal":"yes (truecolor)"},{"key":"Toast","name":"Toast","label":"Toast","hex":"#412130","rgb":"rgb(65, 33, 48)","group":"Diff deletions","hueFamily":"Pink","tone":"deep balanced","safe256":false,"vscodeTerminal":"yes (truecolor)","ideaTerminal":"yes (truecolor)"},{"key":"NeueGuac","name":"Neue Guac","label":"Neue Guac","hex":"#00B875","rgb":"rgb(0, 184, 117)","group":"Provisional","hueFamily":"Green","tone":"dark vivid","safe256":false,"vscodeTerminal":"yes (truecolor)","ideaTerminal":"yes (truecolor)"},{"key":"NeueZinc","name":"Neue Zinc","label":"Neue Zinc","hex":"#0E9996","rgb":"rgb(14, 153, 150)","group":"Provisional","hueFamily":"Cyan","tone":"dark vivid","safe256":false,"vscodeTerminal":"yes (truecolor)","ideaTerminal":"yes (truecolor)"}];
    const grid = document.getElementById('grid');
    const copyTip = document.getElementById('copyTip');

    function showCopyTip(text) {
      copyTip.textContent = text;
      clearTimeout(showCopyTip._timer);
      showCopyTip._timer = setTimeout(() => {
        copyTip.textContent = '';
      }, 1800);
    }

    async function copyText(text) {
      if (navigator.clipboard && navigator.clipboard.writeText) {
        try {
          await navigator.clipboard.writeText(text);
          return;
        } catch (err) {
          // Some hosts (for example embedded previews) block Clipboard API.
          // Fall back to document.execCommand("copy").
        }
      }
      const ta = document.createElement('textarea');
      ta.value = text;
      ta.style.position = 'fixed';
      ta.style.left = '-9999px';
      document.body.appendChild(ta);
      ta.focus();
      ta.select();
      const ok = document.execCommand('copy');
      document.body.removeChild(ta);
      if (!ok) {
        throw new Error('clipboard unavailable');
      }
    }

    async function copyColorRef(item) {
      const text = 'charmtone.' + item.key;
      await copyText(text);
      showCopyTip('Copied ' + text);
    }

    for (const item of data) {
      const card = document.createElement('article');
      card.className = 'swatch';
      card.tabIndex = 0;
      card.setAttribute('role', 'button');
      card.setAttribute('aria-label', 'Copy charmtone token for ' + item.name);
      card.innerHTML =
        '<div class="chip" style="background:' + item.hex + '"></div>' +
        '<div class="meta">' +
          '<div class="name">' + item.name + '</div>' +
          '<div class="hex">' + item.hex + ' / ' + item.rgb + '</div>' +
          '<div class="tags">' +
            '<span class="tag">' + item.group + '</span>' +
            '<span class="tag">' + item.hueFamily + '</span>' +
            '<span class="tag">' + item.tone + '</span>' +
            '<span class="tag">VS Code: ' + item.vscodeTerminal + '</span>' +
            '<span class="tag">IDEA: ' + item.ideaTerminal + '</span>' +
            '<span class="tag">xterm256: ' + (item.safe256 ? 'yes' : 'no') + '</span>' +
          '</div>' +
        '</div>';
      const copyHandler = () => {
        copyColorRef(item).catch(err => {
          showCopyTip('Copy failed: ' + err);
        });
      };
      card.addEventListener('click', copyHandler);
      card.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' || e.key === ' ') {
          e.preventDefault();
          copyHandler();
        }
      });
      grid.appendChild(card);
    }
